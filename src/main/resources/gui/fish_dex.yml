menu_title: '&8&lFish Encyclopedia'
update_interval: 1
size: 54
items:
  'Border_Glass':
    material: gray_stained_glass_pane
    slots:
      - 0-8
      - 45-53
    display_name: '&8[&7Border&8]'
    lore:
      - '&7Don''t touch me (。・ω・。)'
    left_click_commands: []
    right_click_commands: []
  'fish_dex_items':
    material: '%fish_dex_item%'
    slots:
      - 10-16
      - 19-25
      - 28-34
      - 37-43
    unlocked:
      display_name: '&8[&a%fish_name%&8]'
      lore:
        - '&7Level: %fish_level%'
        - '&7Value: %fish_value% coins'
        - '&7Size: %fish_min_size%-%fish_max_size%cm'
        - '&7Caught: %fish_caught% times'
        - '&7Max Size: %fish_max_caught_size%cm'
    locked:
      display_name: '&8[&c???&8]'
      lore:
        - '&7Unknown Fish'
        - '&cYou haven''t discovered this fish yet!'
        - '&f'
        - '&6[Tip]'
        - '&eCatch this fish to unlock its details!'
    left_click_commands: []
    right_click_commands: []
  'Previous_Page':
    material: arrow
    slot: 48
    display_name: '&8[&aPrevious Page&8]'
    lore:
      - '&7Click to view previous page'
    left_click_commands:
      - '[sound] block.stone_button.click_on 100 1'
      - '[action] fish_dex_page previous'
    right_click_commands:
      - '[sound] block.stone_button.click_on 100 1'
      - '[action] fish_dex_page previous'
  'Next_Page':
    material: arrow
    slot: 50
    display_name: '&8[&aNext Page&8]'
    lore:
      - '&7Click to view next page'
    left_click_commands:
      - '[sound] block.stone_button.click_on 100 1'
      - '[action] fish_dex_page next'
    right_click_commands:
      - '[sound] block.stone_button.click_on 100 1'
      - '[action] fish_dex_page next'
  'Back_Button':
    material: barrier
    slot: 45
    display_name: '&8[&cBack&8]'
    lore:
      - '&7Click to return to main menu'
    left_click_commands:
      - '[sound] block.ender_chest.close 100 0.5'
      - '[action] open_gui main_menu'
    right_click_commands:
      - '[sound] block.ender_chest.close 100 0.5'
      - '[action] open_gui main_menu'