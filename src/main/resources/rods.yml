# kkfish Fishing Rod Configuration
# Rod Configuration Example
# You can create custom fishing rods with various properties and effects
# Example rod configuration (add under rods: node):
# custom-legendary-rod:
#   difficulty: 0.5 # Difficulty level (higher value = harder)
#   float-area-size: 5 # Float area size percentage
#   durability: 1000 # Durability
#   enchantability: 30 # Enchantability level
#   charge-speed: 0.5 # Charge speed multiplier (lower = faster)
#   bite-chance-bonus: 0.5 # Bite chance bonus
#   rare-fish-chance: 0.3 # Rare fish chance multiplier
#   material: "DIAMOND_FISHING_ROD" # Minecraft material type
#   custom-model-data: -1 # Custom model data
#   display-name: "&6&lLegendary Fishing Rod" # Display name in game
#   description: "A powerful fishing rod with unique abilities"
#   permissions: ["kkfish.rod.legendary"] # Required permissions
#   effects: ["LUCK", "LURE"] # Special effects
#   # Other configuration items...

# Fishing Rod List
rods:
  # Basic Fishing Rods
  default:
    difficulty: 1.0 # Difficulty level (higher value = harder)
    float-area-size: 30 # Float area size percentage
    durability: 65 # Durability
    enchantability: 15 # Enchantability level
    charge-speed: 1.0 # Charge speed multiplier (higher = faster charge, easier to overcharge)
    bite-chance-bonus: 0.0 # Bite chance bonus
    rare-fish-chance: 0.0 # Rare fish chance multiplier
    material: "FISHING_ROD" # Minecraft material type
    custom-model-data: -1 # Custom model data
    template: "default" # Item description template
    display-name: "§fWooden Fishing Rod" # Display name in game
    description: "The most basic fishing rod, suitable for beginners."
    permissions: [] # Required permissions
  
  stone-fishing-rod:
    difficulty: 1.1
    float-area-size: 25
    durability: 131
