# ==========================
# 帮助命令
# ==========================
help_message: |
  &6帮助命令
  &d/kkfish help - 显示此帮助信息
  &d/kkfish reload - 重新加载插件配置
  &d/kkfish info - 显示插件信息
  &d/kkfish debug - 切换调试模式
  &d/kkfish give <player> <fish:name/rod:name> - 给予玩家物品
  &d/kkfish gui [main|hook|dex|record|help] - 打开钓鱼系统界面
  &d/kkfish version - 检查插件版本
  &d/kkfish sell <all|hand> - 出售背包或手中的鱼
  &d/kkfish sell <all|hand> <player> - [OP] 帮助其他玩家出售物品
  &d/kkfish compete <start|stop|forcestop|list> [competition_id] [duration] - 管理钓鱼比赛
  &d/kkfish toggle - 切换钓鱼模式

