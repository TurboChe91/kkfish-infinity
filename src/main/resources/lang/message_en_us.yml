# ==========================
# Help Commands
# ==========================
help_message: |
  &6Help Commands
  &d/kkfish help - Show this help message
  &d/kkfish reload - Reload plugin configuration
  &d/kkfish info - Show plugin information
  &d/kkfish debug - Toggle debug mode
  &d/kkfish give <player> <fish:name/rod:name> - Give player item
  &d/kkfish gui [main|hook|dex|record|help] - Open fishing system interface
  &d/kkfish version - Check plugin version
  &d/kkfish sell <all|hand> - Sell fish in inventory or hand
  &d/kkfish sell <all|hand> <player> - [OP] Help other players sell items
  &d/kkfish compete <start|stop|forcestop|list> [competition_id] [duration] - Manage fishing competitions
  &d/kkfish toggle - Toggle fishing mode

