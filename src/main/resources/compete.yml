# kkfish Competition Configuration
# Competition Configuration Example
# You can create custom fishing competitions with various types and settings
# Example competition configuration (add under competitions: node):
# custom-competition:
#   name: "Custom Fishing Competition"
#   type: "TOTAL_VALUE"  # Competition type: AMOUNT, TOTAL_VALUE, SINGLE_VALUE, POINTS_ONLY
#   schedule: "every 1 19:00"  # Every Monday at 19:00
#   min-players: 5  # Minimum players required
#   duration: 3600  # Duration in seconds (1 hour)
#   
#   # Fish List Configuration (for POINTS_ONLY type only)
#   fish-list:
#     - "cod:1.0"
#     - "salmon:0.8"
#   
#   # Point Multiplier (for POINTS_ONLY type only)
#   point-multiplier: 1.5
#   
#   # Reward Configuration
#   rewards:
#     "1":
#       - "give %player% diamond 10"
#       - "eco give %player% 1000"
#   reward-display-info:
#     "1":
#       - "1st Place Reward"
#       - "10 Diamonds + 1000 Coins"
#   
#   # Display Configuration
#   display:
#     title:
#       enabled: true
#       countdown-format: "&e&lCompetition Countdown: &r&6%time%"
#     actionbar:
#       enabled: true
#     bossbar:
#       enabled: true
#     scoreboard:
#       enabled: true
#       title: "&e&lCustom Fishing Competition"
#   # Other configuration items...
competitions:
  weekly_amount_competition:
    name: "Weekly Fishing Amount Competition"
    enabled: true
    type: "AMOUNT"
    schedule: "every 3 20:00"
    min-players: 5
    duration: 3600
    
    rewards:
      "1":
        - "give %player% diamond 10"
        - "eco give %player% 1000"
        - "say Congratulations %player% won 1st place in the Weekly Fishing Amount Competition!"
      "2":
        - "give %player% diamond 5"
        - "eco give %player% 500"
      "3":
        - "give %player% diamond 2"
        - "eco give %player% 200"
      "10":
        - "eco give %player% 50"
    
    reward-display-info:
      "1":
        - "1st Place Reward"
        - "10 Diamonds + 1000 Coins"
      "2":
        - "2nd Place Reward"
        - "5 Diamonds + 500 Coins"
      "3":
        - "3rd Place Reward"
        - "2 Diamonds + 200 Coins"
      "10":
        - "Participation Reward"
        - "50 Coins"
    
    display:
      title:
        enabled: true
        countdown-format: "&e&lCompetition Countdown: &r&6%time%"
        status-format: "&e&lCompetition In Progress: &r&6%status%"
        status-duration: 10
      
      actionbar:
        enabled: true
        countdown-format: "&eCompetition Countdown: &6%time%"
        status-format: "&eCompetition In Progress: &6%status%"
        status-duration: 10
      
      bossbar:
        enabled: true
        countdown-format: "&e&lWeekly Fishing Amount Competition - Countdown: &6%time%"
        status-format: "&e&lWeekly Fishing Amount Competition - %status%"
        status-duration: 10
        color: "BLUE"
        style: "SEGMENTED_10"
      
      scoreboard:
        enabled: true
        title: "&e&lWeekly Fishing Amount Competition"
        lines:
          "&e&lCurrent Rank:": 1
          "&f": -1
          "&61st: %player_1%": 5
          "&e2nd: %player_2%": 5
          "&73rd: %player_3%": 5

