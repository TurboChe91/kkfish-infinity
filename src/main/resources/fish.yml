      - "diamond:1"
      - "iron_ingot:3"
    biomes: ["RIVER", "SWAMP", "BEACH", "FROZEN_RIVER", "PLAINS", "FOREST", "TAIGA", "JUNGLE"]
    weather: ["CLEAR", "RAIN"]
    time: ["ANY"]
    seasons: ["SPRING", "SUMMER", "AUTUMN", "WINTER"]
    bite-rate-multiplier: 1.1
    description: "A common freshwater fish with delicious meat, commonly found in rivers"
    display-name: "§fCarp"
    material: "COD"
    custom-model-data: -1
    enchant-glow: false
    effects: []
    movement-amplitude: 1.0
    command: []
    saturation: 4
    announcement: false
