# kkfish Fish Configuration
# Fish Configuration Example
# You can create custom fish with various properties and behaviors
# Example fish configuration (add under fish: node):
# custom-legendary-fish:
#   level:
#     - legendary:100
#   activity: 2.0
#   min-size: 50
#   max-size: 150
#   value: 1000
#   biomes: ["OCEAN", "DEEP_OCEAN"]
#   weather: ["THUNDER"]
#   time: ["NIGHT"]
#   seasons: ["SUMMER"]
#   bite-rate-multiplier: 0.3
#   description: "A rare and powerful fish"
#   display-name: "&6&lCustom Legendary Fish"
#   material: "TROPICAL_FISH"
#   custom-model-data: -1
#   enchant-glow: true
#   effects: ["FIRE_RESISTANCE 3:60", "WATER_BREATHING 2:120"]
#   movement-amplitude: 2.0
#   command: ["-o say Congratulations %player%!", "-c give %player% diamond 10"]
#   saturation: 20
#   announcement: true
#   template: "default"
#   # Other configuration items...
fish:
  Carp:
    level:
      - common:70
      - rare:20
      - epic:10
