# kkfish Hook Configuration
# Hook Configuration Example
# You can create custom hooks with various properties and effects
# Example hook configuration (add under hooks: node):
# custom-diamond-hook:
#   material: "DIAMOND_BLOCK"
#   custom-model-data: -1
#   display-name: "&bCustom Diamond Hook"
#   description: "&7A powerful hook with unique effects"
#   permissions: ["kkfish.hooks.custom"]
#   rarity: "legendary"
#   effects:
#     bite-rate-bonus: 0.3  # +30% bite rate
#     rare-fish-chance: 0.2  # +20% rare fish chance
#   price:
#     vault: 1000.0  # Cost in economy money
#     points: 200    # Cost in points
#   # Other configuration items...
